<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Target word category overview</title>
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 24px;
  color: #222;
  background: #ffffff;
}
h1 {
  font-size: 22px;
  margin-bottom: 6px;
  font-weight: 600;
}
p {
  font-size: 14px;
  color: #555;
  max-width: 1100px;
  line-height: 1.45;
}
.table-wrapper {
  overflow-x: auto;
  margin-top: 20px;
  border-top: 2px solid #b5b5b5;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
th, td {
  border-bottom: 1px solid #d9d9d9;
  padding: 7px 9px;
  text-align: left;
  vertical-align: top;
  white-space: nowrap;
}
th {
  background-color: #f3f3f3;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 1;
}
tr:nth-child(even) {
  background-color: #fafafa;
}
td:last-child {
  white-space: normal;
  min-width: 320px;
}
</style>
</head>

</html>
